name: minsky-infra
description: Railway infrastructure for Minsky services
runtime:
  name: nodejs
  options:
    packagemanager: npm
config:
  pulumi:tags:
    value:
      pulumi:template: typescript
packages:
  railway:
    source: pulumi/pulumi/terraform-provider
    version: 1.1.1
    parameters:
      - terraform-community-providers/railway
