name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Cache Bun install (root)
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-root-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-root-

      - name: Install dependencies
        run: bun install --frozen-lockfile --no-progress

      - name: Check formatting
        run: bun run format:check

      - name: Lint (strict — fails on any warning)
        run: bun run lint:strict

      - name: Type check
        run: bun run typecheck

      - name: Cache Bun install (services/reviewer)
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-reviewer-${{ hashFiles('services/reviewer/bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-reviewer-

      - name: Type check (services/reviewer)
        working-directory: services/reviewer
        run: |
          bun install --frozen-lockfile --no-progress
          bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun build src/cli.ts --outdir dist --target bun
