# Per-PR cockpit preview deploy (mt#2096).
#
# Deploys the cockpit server to Railway when a PR touches cockpit source
# files. Posts the preview URL as a PR comment. Redeploys production on
# PR close/merge to restore main-branch state.
#
# Architecture: single Railway environment (production) — each PR push
# overwrites the prior deploy. Sufficient for a single-operator workflow
# where parallel cockpit previews are not needed. If parallel previews
# become necessary, upgrade to per-PR Railway environments with a
# workspace-level API token.
#
# Prerequisites (one-time manual setup):
#   1. Railway project + service created for cockpit-preview
#   2. RAILWAY_COCKPIT_TOKEN secret set on this repo (project token scoped to production env)
#   3. Real resource IDs in services/cockpit/railway.config.ts
#   4. Read-only Supabase DB role created (see scripts/supabase-preview-role.sql)

name: Cockpit Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "src/cockpit/**"
      - "services/cockpit/**"

concurrency:
  group: cockpit-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy cockpit preview
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_COCKPIT_TOKEN }}
        run: |
          railway up \
            --service cockpit-preview \
            --detach

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Cockpit Preview',
              '',
              '**Preview URL:** https://cockpit-preview-production.up.railway.app',
              '',
              `Deployed from commit \`${context.payload.pull_request.head.sha.slice(0, 9)}\`.`,
              'Preview runs in **read-only mode** — mutations are disabled.',
              '',
              `_Updated by [Cockpit Preview](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})._`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body?.includes('### Cockpit Preview') &&
              c.user?.login === 'github-actions[bot]'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  restore:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Restore main-branch deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_COCKPIT_TOKEN }}
        run: |
          railway up \
            --service cockpit-preview \
            --detach
