name: Infra Drift Check

# mt#2738 — Pulumi GitOps Phase 1 (DETECTION). Scheduled `pulumi preview
# --refresh --expect-no-changes` against the prod stack: refreshes live Railway
# state, then compares to infra/index.ts. If they differ (drift), opens or
# updates a GitHub issue so out-of-band changes surface automatically — the
# structural fix for the recurring manual drift re-discovery (mt#2351 / mt#2407
# / mt#2734). Detection only; never applies.
#
# NOTE: there is KNOWN pre-existing drift at Phase-1 launch (cockpit +create,
# minsky-mcp rootDirectory, site SITE_URL) owned by mt#2351 / mt#2407 — so this
# job will correctly report drift on each run until those are reconciled.
#
# Prerequisites: PULUMI_ACCESS_TOKEN repo secret (see infra-preview.yml).

on:
  schedule:
    - cron: "0 12 * * *" # daily at 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Pulumi CLI
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: Install infra dependencies + provider SDK
        working-directory: infra
        run: pulumi install
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      # --refresh pulls live Railway state; --expect-no-changes exits non-zero
      # if the refreshed state differs from the code (i.e. drift). The full diff
      # prints to the run log via --diff.
      - name: Detect drift
        id: drift
        working-directory: infra
        run: |
          set +e
          pulumi preview --refresh --expect-no-changes \
            --stack edobry/minsky-infra/prod --diff --non-interactive
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Open or update drift issue
        if: steps.drift.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = "<!-- infra-drift-cron -->";
            const body = `${marker}\n\nScheduled drift check on \`edobry/minsky-infra/prod\` reported **drift** (\`pulumi preview --refresh --expect-no-changes\` exited non-zero). See the full diff in the run log:\n${runUrl}\n\nReconcile via mt#2351 / mt#2407, or investigate an out-of-band Railway change.`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "infra-drift",
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Drift still present as of ${new Date().toISOString()}.\n${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "infra drift detected on prod stack",
                body,
                labels: ["infra-drift"],
              });
            }
