name: Cold-Start Migration Smoke

# mt#2369 — Phase 0 portability floor: cold-start migration smoke test.
#
# Stands up a Postgres service, builds the bundle, then FROM A TEMP DIR
# (not the repo root) runs `minsky persistence migrate --execute` against
# the empty Postgres, then verifies the `tasks` table was created.
#
# This is the regression gate for the resolvePgMigrationsFolder() fix:
# it proves the bundled binary can find its migrations when run from an
# arbitrary working directory outside the Minsky source checkout.
#
# Distinct from bundle-boot-smoke.yml (mt#1787), which only asserts that
# the MCP HTTP server starts and /health returns 200 — it does NOT exercise
# any database schema bootstrap. This workflow is the missing layer.
#
# Job name (`cold-start-migrate`) is the contract: operators and the merge
# gate can query the GitHub Checks API for a check_run with this name.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cold-start-migrate:
    name: cold-start-migrate
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector-enabled image (mt#2439): the schema uses the `vector` type
        # and the bootstrap snapshot runs CREATE EXTENSION IF NOT EXISTS vector,
        # which requires the extension to be installable — vanilla postgres:16
        # does not ship pgvector.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: minsky_test
          POSTGRES_PASSWORD: minsky_test
          POSTGRES_DB: minsky_cold_start
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Compose from parts to avoid gitleaks flagging a hardcoded URL with password.
      # These are test-only credentials with no access outside this job's ephemeral postgres container.
      PGUSER: minsky_test
      PGPASSWORD: minsky_test
      PGHOST: localhost
      PGDATABASE: minsky_cold_start
      DATABASE_URL: ${{ format('postgres://{0}:{1}@{2}:5432/{3}', 'minsky_test', 'minsky_test', 'localhost', 'minsky_cold_start') }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: $HOME/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock', 'services/reviewer/bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile --no-progress

      - name: Build production bundle
        run: bun run build

      - name: Verify bundle exists
        run: |
          test -f dist/minsky.js \
            || { echo "::error::dist/minsky.js missing after build"; exit 1; }
          ls -la dist/minsky.js

      - name: Verify migrations copied into dist/
        run: |
          test -d dist/storage/migrations/pg \
            || { echo "::error::dist/storage/migrations/pg missing (build:copy-migrations regression)"; exit 1; }
          test -f dist/storage/migrations/pg/meta/_journal.json \
            || { echo "::error::dist/storage/migrations/pg/meta/_journal.json missing"; exit 1; }
          # Fresh-DB bootstrap artifact (mt#2439): the cold-start path depends
          # on the snapshot shipping next to the migrations in the bundle.
          test -f dist/storage/migrations/pg/bootstrap/full-schema.sql \
            || { echo "::error::dist/storage/migrations/pg/bootstrap/full-schema.sql missing (bootstrap snapshot not copied)"; exit 1; }
          test -f dist/storage/migrations/pg/bootstrap/meta.json \
            || { echo "::error::dist/storage/migrations/pg/bootstrap/meta.json missing"; exit 1; }
          echo "Migrations present:"
          ls dist/storage/migrations/pg/

      - name: Run cold-start migration smoke (from temp dir)
        env:
          # minsky's config loader reads MINSKY_POSTGRES_URL (mapped to
          # persistence.postgres.connectionString) plus the required
          # persistence.backend discriminator — DATABASE_URL above is only the
          # smoke script's env-gate. Without these the migrate step fails with
          # "PostgreSQL connection string not found" (mt#1428 / mt#2411).
          # Step-scoped (not job-level): config validation runs during the
          # build step too, and a connectionString without further required
          # keys would fail it there.
          MINSKY_PERSISTENCE_BACKEND: postgres
          MINSKY_POSTGRES_URL: ${{ format('postgres://{0}:{1}@{2}:5432/{3}', 'minsky_test', 'minsky_test', 'localhost', 'minsky_cold_start') }}
        run: |
          # The smoke script changes to a temp directory internally so minsky
          # is called from outside the repo root — this is the core regression
          # check for resolvePgMigrationsFolder() (mt#2369).
          bun scripts/smoke-cold-start-migrate.ts

      - name: Verify tasks table exists
        run: |
          # Direct SQL assertion as a belt-and-suspenders check.
          # Uses PGPASSWORD, PGHOST, PGUSER, PGDATABASE from job-level env.
          psql -c "SELECT COUNT(*) FROM tasks;" \
            || { echo "::error::tasks table does not exist after migration"; exit 1; }
          echo "tasks table present and queryable."
