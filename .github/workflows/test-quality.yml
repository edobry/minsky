name: Test Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-quality:
    name: Prevent Placeholder Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Detect placeholder tests
        run: |
          # Check for bare expect(true).toBe(true) placeholder assertions
          if grep -r --exclude-dir=node_modules "expect(true)\.toBe(true)" --include="*.test.ts" --include="*.test.js" .; then
            echo "::error::Placeholder assertions detected (expect(true).toBe(true)). Please replace with real assertions."
            exit 1
          fi

          # Check for tests explicitly marked as placeholders via comments
          if grep -r --exclude-dir=node_modules "// [Pp]laceholder\|// TODO.*test\|// FIXME.*test" --include="*.test.ts" --include="*.test.js" .; then
            echo "::error::Placeholder test comments detected. Please implement proper tests."
            exit 1
          fi

          echo "No placeholder tests detected."
